####################################################################################################
# System & Application Health Checks Configuration
#
# This file defines thresholds and parameters used by:
#   PrePost_Release_Health_Checks.sh
#
# The script performs system, application, and Oracle database health checks
# before and after release installations to ensure environment stability.
#
# This file contains configuration ONLY.
# No commands are executed directly from this file.
####################################################################################################
####################################################################################################
# HA & CLUSTER VALIDATION
#
# sv_ha_ctl cluster_status
#   - Verifies High Availability controller and cluster health
#
# sv_status -cluster
#   - Displays overall status of all SingleView nodes in the cluster
#
# svstatus
#   - Shows detailed service status for the local node
#
# sv_status
# - Shows detailed output for each node
####################################################################################################
####################################################################################################
# APPLICATION HEALTH CHECKS
#
# sv cache_check
#   - Validates application cache integrity
#
# Z Tables Check
#   - Confirms no unexpected Z tables exist in Production environments
#
# Debug Mode Validation
#   - Ensures debug flags are not enabled in unexpected processes
####################################################################################################
####################################################################################################
# DATABASE HEALTH CHECKS (ORACLE)
#
# Tablespace Usage
#   - Ensures Oracle tablespace utilization stays below threshold
#
# dbverify
#   - Verifies Oracle datafile blocks for corruption
#
# orasql -e <duration>
#   - Lists SQL statements running longer than ORASQL_EXEC_LIMIT seconds
#
# tnsping $ORACLE_SID
#   - Tests Oracle Net connectivity
#   - Validates latency is within acceptable range
####################################################################################################
####################################################################################################
# SYSTEM RESOURCE CHECKS
#
# ATA_HOME directory
#   - Ensures application home directory exists
#   - Validates minimum free disk space
#
# /tmp directory
#   - Ensures availability and minimum free space
#
# Available Memory
#   - Verifies sufficient memory for normal operations
####################################################################################################
####################################################################################################
# DEPLOYMENT SAFETY CHECKS
#
# Standby Node Validation
#   - Ensures STD instances are NOT running on Standby (PE) nodes
#
# cbtasks
#   - Confirms control and background tasks are operating correctly
####################################################################################################
####################################################################################################
# CONFIGURABLE THRESHOLDS
#
# Adjust the values below according to environment requirements.
##########################################################################################################
MIN_ATA_HOME_FREE_PCT=30       # Minimum percentage of free disk space required in $ATA_HOME directoy (%)
MIN_TMP_FREE_PCT=40            # Minimum percentage of free disk space required in /tmp directoy (%)
MIN_MEM_AVAILABLE_PCT=40       # Minimum percentage of required available system memory (%)
MAX_TNSPING_LATENCY_MS=200     # Maximum acceptable Oracle Net latency (milliseconds)
MAX_TABLESPACE_USED_PCT=80     # Maximum allowed Oracle tablespace usage (%)
ORASQL_EXEC_LIMIT=300          # Report SQL statements running >= this duration (seconds)
####################################################################################################
# EXECUTION
#
# Usage:
#   ./PrePost_Release_Health_Checks.sh health_check.conf
####################################################################################################
